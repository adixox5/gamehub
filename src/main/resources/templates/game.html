<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${game.title} + ' - GameHub'">Gra</title>
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .game-frame {
            width: 100%;
            max-width: 800px;
            height: 600px;
            border: 2px solid var(--color-border);
            border-radius: 10px;
            box-shadow: 0 4px 10px var(--color-shadow);
        }
        .game-info {
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
            background-color: var(--color-bg-card);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--color-border);
        }

        .actions-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .leaderboard-btn {
            background-color: var(--color-accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .leaderboard-btn:hover {
            transform: scale(1.05);
        }

        .vote-btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
            border: 1px solid;
            background-color: transparent;
        }
        .vote-btn-like {
            color: #2ecc71;
            border-color: #2ecc71;
        }
        .vote-btn-like:hover {
            background-color: #2ecc71;
            color: white;
            transform: scale(1.05);
        }
        .vote-btn-dislike {
            color: #e74c3c;
            border-color: #e74c3c;
        }
        .vote-btn-dislike:hover {
            background-color: #e74c3c;
            color: white;
            transform: scale(1.05);
        }
        .vote-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--color-bg-card);
            margin: 10% auto;
            padding: 20px;
            border: 1px solid var(--color-border);
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            color: var(--color-text-primary);
        }
        .close-btn {
            color: var(--color-text-secondary);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover {
            color: var(--color-accent);
        }
        .lb-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .lb-table th, .lb-table td {
            padding: 10px;
            border-bottom: 1px solid var(--color-border);
            text-align: left;
        }
        .lb-table th {
            color: var(--color-text-secondary);
        }
        .lb-rank-1 { color: gold; font-weight: bold; }
        .lb-rank-2 { color: silver; font-weight: bold; }
        .lb-rank-3 { color: #cd7f32; font-weight: bold; }
    </style>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container">
    <div th:if="${game != null}" class="game-container">
        <h1 th:text="${game.title}" style="margin-bottom: 10px;"></h1>
        <iframe th:src="@{${game.gameUrl}}" class="game-frame" frameborder="0" id="game-iframe"></iframe>

        <div class="game-info">
            <h3 style="margin-bottom: 10px;">Opis gry</h3>
            <p th:text="${game.description}" style="color: var(--color-text-secondary);"></p>

            <div class="actions-bar" id="vote-buttons-group">
                <button type="button" class="vote-btn vote-btn-like" th:onclick="'reactGame(' + ${game.id} + ', \'like\')'">
                    <i class="fas fa-thumbs-up"></i> <span id="like-count" th:text="${game.likes}">0</span>
                </button>
                <button type="button" class="vote-btn vote-btn-dislike" th:onclick="'reactGame(' + ${game.id} + ', \'dislike\')'">
                    <i class="fas fa-thumbs-down"></i> <span id="dislike-count" th:text="${game.dislikes}">0</span>
                </button>
                <button id="openLeaderboardBtn" class="leaderboard-btn" th:data-game="${game.title}">
                    <i class="fas fa-trophy"></i> Tabela liderów
                </button>
            </div>
        </div>
    </div>

    <div th:if="${game == null}" style="text-align: center; margin-top: 50px;">
        <h2>Nie znaleziono gry</h2>
        <a th:href="@{/}" style="color: var(--color-accent);">Wróć na stronę główną</a>
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Top 10 - <span id="lb-game-title"></span></h2>
            <table class="lb-table">
                <thead>
                <tr>
                    <th>Miejsce</th>
                    <th>Gracz</th>
                    <th>Wynik</th>
                </tr>
                </thead>
                <tbody id="lb-body">
                <tr><td colspan="3" style="text-align: center;">Ładowanie...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var currentGameId = /*[[${game != null ? game.id : null}]]*/ null;

    document.addEventListener("DOMContentLoaded", function() {
        const gameIframe = document.getElementById("game-iframe");
        if (gameIframe) {
            gameIframe.onload = function() {
                gameIframe.contentWindow.focus();
            };
        }

        if (currentGameId && localStorage.getItem('voted_game_' + currentGameId)) {
            disableVoteButtons();
        }

        const modal = document.getElementById("leaderboardModal");
        const btn = document.getElementById("openLeaderboardBtn");
        const span = document.getElementsByClassName("close-btn")[0];

        if(btn) {
            btn.onclick = function() {
                const gameTitle = this.getAttribute("data-game");
                document.getElementById("lb-game-title").innerText = gameTitle;
                modal.style.display = "block";

                fetch('/api/records/top/' + gameTitle)
                    .then(response => response.json())
                    .then(records => {
                        const tbody = document.getElementById('lb-body');
                        tbody.innerHTML = '';

                        if (records.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">Brak rekordów. Bądź pierwszy!</td></tr>';
                            return;
                        }

                        records.forEach((record, index) => {
                            const tr = document.createElement('tr');
                            let rankClass = '';
                            if(index === 0) rankClass = 'lb-rank-1';
                            else if(index === 1) rankClass = 'lb-rank-2';
                            else if(index === 2) rankClass = 'lb-rank-3';

                            tr.innerHTML = `
                                <td class="${rankClass}">#${index + 1}</td>
                                <td><strong>${record.username}</strong></td>
                                <td><span style="color: var(--color-accent); font-weight: bold;">${record.score}</span></td>
                            `;
                            tbody.appendChild(tr);
                        });
                    })
                    .catch(err => {
                        document.getElementById('lb-body').innerHTML = '<tr><td colspan="3" style="text-align: center;">Błąd ładowania wyników.</td></tr>';
                    });
            }
        }

        if(span) {
            span.onclick = function() {
                modal.style.display = "none";
            }
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    });

    function disableVoteButtons() {
        var group = document.getElementById('vote-buttons-group');
        if(group) {
            var buttons = group.querySelectorAll('.vote-btn');
            buttons.forEach(function(btn) {
                btn.disabled = true;
                btn.classList.add('disabled');
            });
        }
    }

    function reactGame(gameId, action) {
        if (localStorage.getItem('voted_game_' + gameId)) {
            return;
        }

        fetch(`/api/games/${gameId}/${action}`, {
            method: 'POST'
        })
        .then(response => {
            if(response.ok) return response.text();
            throw new Error('Network error');
        })
        .then(newCount => {
            if(action === 'like') {
                document.getElementById('like-count').innerText = newCount;
            } else {
                document.getElementById('dislike-count').innerText = newCount;
            }

            localStorage.setItem('voted_game_' + gameId, 'true');
            disableVoteButtons();
        })
        .catch(error => console.error('Error:', error));
    }
    /*]]>*/
</script>
</body>
</html>
