<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${game.title} + ' - GameHub'">Gra</title>
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .game-frame {
            width: 100%;
            max-width: 800px;
            height: 600px;
            border: 2px solid var(--color-border);
            border-radius: 10px;
            box-shadow: 0 4px 10px var(--color-shadow);
        }
        .game-info {
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
            background-color: var(--color-bg-card);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--color-border);
        }

        .leaderboard-btn {
            background-color: var(--color-accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .leaderboard-btn:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--color-bg-card);
            margin: 10% auto;
            padding: 20px;
            border: 1px solid var(--color-border);
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            color: var(--color-text-primary);
        }
        .close-btn {
            color: var(--color-text-secondary);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover {
            color: var(--color-accent);
        }
        .lb-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .lb-table th, .lb-table td {
            padding: 10px;
            border-bottom: 1px solid var(--color-border);
            text-align: left;
        }
        .lb-table th {
            color: var(--color-text-secondary);
        }
        .lb-rank-1 { color: gold; font-weight: bold; }
        .lb-rank-2 { color: silver; font-weight: bold; }
        .lb-rank-3 { color: #cd7f32; font-weight: bold; }
    </style>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container">
    <div th:if="${game != null}" class="game-container">
        <h1 th:text="${game.title}" style="margin-bottom: 10px;"></h1>
        <iframe th:src="@{${game.gameUrl}}" class="game-frame" frameborder="0"></iframe>

        <div class="game-info">
            <h3 style="margin-bottom: 10px;">Opis gry</h3>
            <p th:text="${game.description}" style="color: var(--color-text-secondary);"></p>

            <button id="openLeaderboardBtn" class="leaderboard-btn" th:data-game="${game.title}">
                <i class="fas fa-trophy"></i> Tabela liderów
            </button>
        </div>
    </div>

    <div th:if="${game == null}" style="text-align: center; margin-top: 50px;">
        <h2>Nie znaleziono gry</h2>
        <a th:href="@{/}" style="color: var(--color-accent);">Wróć na stronę główną</a>
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Top 10 - <span id="lb-game-title"></span></h2>
            <table class="lb-table">
                <thead>
                <tr>
                    <th>Miejsce</th>
                    <th>Gracz</th>
                    <th>Wynik</th>
                </tr>
                </thead>
                <tbody id="lb-body">
                <tr><td colspan="3" style="text-align: center;">Ładowanie...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const modal = document.getElementById("leaderboardModal");
        const btn = document.getElementById("openLeaderboardBtn");
        const span = document.getElementsByClassName("close-btn")[0];

        if(btn) {
            btn.onclick = function() {
                const gameTitle = this.getAttribute("data-game");
                document.getElementById("lb-game-title").innerText = gameTitle;
                modal.style.display = "block";

                fetch('/api/records/top/' + gameTitle)
                    .then(response => response.json())
                    .then(records => {
                        const tbody = document.getElementById('lb-body');
                        tbody.innerHTML = '';

                        if (records.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">Brak rekordów. Bądź pierwszy!</td></tr>';
                            return;
                        }

                        records.forEach((record, index) => {
                            const tr = document.createElement('tr');
                            let rankClass = '';
                            if(index === 0) rankClass = 'lb-rank-1';
                            else if(index === 1) rankClass = 'lb-rank-2';
                            else if(index === 2) rankClass = 'lb-rank-3';

                            tr.innerHTML = `
                                <td class="${rankClass}">#${index + 1}</td>
                                <td><strong>${record.username}</strong></td>
                                <td><span style="color: var(--color-accent); font-weight: bold;">${record.score}</span></td>
                            `;
                            tbody.appendChild(tr);
                        });
                    });
            }
        }

        if(span) {
            span.onclick = function() {
                modal.style.display = "none";
            }
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    });
</script>
</body>
</html>
