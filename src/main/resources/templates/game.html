<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${game != null ? game.title + ' - GameHub' : 'Błąd Gry - GameHub'}">Gra - GameHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        .game-view-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 50px;
        }

        .game-header-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--color-bg-card);
            padding: 15px 25px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 4px 10px var(--color-shadow);
            border-bottom: 2px solid var(--color-accent);
        }

        .game-title-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-title-info img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--color-border);
        }

        .game-title-info h2 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--color-text-primary);
        }

        .game-actions-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-iframe-wrapper {
            width: 100%;
            max-width: 1200px;
            height: 75vh;
            background-color: #000;
            border-radius: 0 0 15px 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px var(--color-shadow);
        }

        .game-iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .error-state {
            text-align: center;
            padding: 80px 20px;
            background-color: var(--color-bg-card);
            border-radius: 20px;
            width: 100%;
            box-shadow: 0 4px 10px var(--color-shadow);
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container game-view-container">

    <div th:if="${game != null}" style="width: 100%; display: flex; flex-direction: column; align-items: center;">

        <div class="game-header-bar">
            <div class="game-title-info">
                <img th:src="@{${game.imageUrl}}" alt="Ikona gry">
                <div>
                    <h2 th:text="${game.title}">Tytuł gry</h2>
                    <span class="badge bg-primary" th:text="${game.category}">Kategoria</span>
                </div>
            </div>

            <div class="game-actions-group">
                <div class="btn-group me-3" role="group" id="vote-buttons-group">
                    <button type="button" class="btn btn-outline-success" th:onclick="'reactGame(' + ${game.id} + ', \'like\')'">
                        <i class="fas fa-thumbs-up"></i> <span id="like-count" th:text="${game.likes}">0</span>
                    </button>
                    <button type="button" class="btn btn-outline-danger" th:onclick="'reactGame(' + ${game.id} + ', \'dislike\')'">
                        <i class="fas fa-thumbs-down"></i> <span id="dislike-count" th:text="${game.dislikes}">0</span>
                    </button>
                </div>
                <a th:href="@{/}" class="btn btn-outline-danger">
                    <i class="fas fa-arrow-left"></i> Wróć do strony głównej
                </a>
            </div>
        </div>

        <div class="game-iframe-wrapper">
            <iframe id="game-iframe" th:src="@{${game.gameUrl}}" allowfullscreen tabindex="0"></iframe>
        </div>

    </div>

    <div th:if="${game == null}" class="error-state">
        <h2 class="mb-3 text-danger"><i class="fas fa-exclamation-triangle"></i> Nie znaleziono gry!</h2>
        <p class="text-muted mb-4">Przepraszamy, ale gra, której szukasz, nie istnieje lub nie została poprawnie załadowana.</p>
        <a th:href="@{/}" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Wróć do strony głównej</a>
    </div>

</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var currentGameId = /*[[${game != null ? game.id : null}]]*/ null;

    document.addEventListener("DOMContentLoaded", function() {
        const gameIframe = document.getElementById("game-iframe");
        if (gameIframe) {
            gameIframe.onload = function() {
                gameIframe.contentWindow.focus();
            };
        }

        if (currentGameId && localStorage.getItem('voted_game_' + currentGameId)) {
            disableVoteButtons();
        }
    });

    function disableVoteButtons() {
        var group = document.getElementById('vote-buttons-group');
        if(group) {
            var buttons = group.querySelectorAll('button');
            buttons.forEach(function(btn) {
                btn.disabled = true;
                btn.classList.add('disabled');
            });
        }
    }

    function reactGame(gameId, action) {
        if (localStorage.getItem('voted_game_' + gameId)) {
            return;
        }

        fetch(`/api/games/${gameId}/${action}`, {
            method: 'POST'
        })
        .then(response => {
            if(response.ok) return response.text();
            throw new Error('Network error');
        })
        .then(newCount => {
            if(action === 'like') {
                document.getElementById('like-count').innerText = newCount;
            } else {
                document.getElementById('dislike-count').innerText = newCount;
            }

            localStorage.setItem('voted_game_' + gameId, 'true');
            disableVoteButtons();
        })
        .catch(error => console.error('Error:', error));
    }
    /*]]>*/
</script>
</body>
</html>
