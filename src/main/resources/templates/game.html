<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${game.title} + ' - GameHub'">Gra</title>
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --game-max-width: 1000px;
        }

        .game-page-header {
            margin-bottom: 30px;
            text-align: left;
            border-left: 5px solid var(--color-accent);
            padding-left: 20px;
        }

        .game-page-header h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--color-text-primary);
        }

        .game-main-wrapper {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            margin-top: 20px;
        }

        @media (max-width: 992px) {
            .game-main-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* Sekcja Gry */
        .game-display-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-viewport {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--color-shadow);
            border: 1px solid var(--color-border);
            aspect-ratio: 16 / 9;
            min-height: 500px;
        }

        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Panel boczny / Informacje */
        .game-details-card {
            background-color: var(--color-bg-card);
            border-radius: 15px;
            border: 1px solid var(--color-border);
            padding: 25px;
            box-shadow: 0 4px 15px var(--color-shadow);
            height: fit-content;
        }

        .game-description-box {
            margin-bottom: 25px;
        }

        .game-description-box h3 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: var(--color-accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .game-description-text {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Przyciski Akcji */
        .game-actions-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .vote-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            color: var(--color-text-primary);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-like:hover:not(.disabled) {
            background-color: #2ecc71;
            color: white;
            border-color: #2ecc71;
            transform: translateY(-2px);
        }

        .btn-dislike:hover:not(.disabled) {
            background-color: #e74c3c;
            color: white;
            border-color: #e74c3c;
            transform: translateY(-2px);
        }

        .btn-leaderboard {
            background-color: var(--color-accent);
            color: white;
            border: none;
            width: 100%;
        }

        .btn-leaderboard:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }

        .action-btn.disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* Modal Tablei Liderów */
        .modal-content {
            border-radius: 20px;
            overflow: hidden;
            border: none;
        }

        .modal-header {
            background: var(--color-accent);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lb-table th {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .lb-rank-badge {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--color-bg);
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container">
    <div th:if="${game != null}">
        <header class="game-page-header">
            <h1 th:text="${game.title}">Tytuł Gry</h1>
            <span style="color: var(--color-text-secondary); font-size: 0.9rem;">
                Kategoria: <strong th:text="${game.category}">Akcja</strong>
            </span>
        </header>

        <div class="game-main-wrapper">
            <section class="game-display-section">
                <div class="game-viewport">
                    <iframe th:src="@{${game.gameUrl}}" class="game-frame" frameborder="0" id="game-iframe" allowfullscreen></iframe>
                </div>
            </section>

            <aside class="game-details-card">
                <div class="game-description-box">
                    <h3><i class="fas fa-info-circle"></i> O grze</h3>
                    <p class="game-description-text" th:text="${game.description}">Opis gry pojawi się tutaj.</p>
                </div>

                <div class="game-actions-stack" id="vote-buttons-group">
                    <div class="vote-row">
                        <button type="button" class="action-btn btn-like" th:onclick="'reactGame(' + ${game.id} + ', \'like\')'">
                            <i class="fas fa-thumbs-up"></i> <span id="like-count" th:text="${game.likes}">0</span>
                        </button>
                        <button type="button" class="action-btn btn-dislike" th:onclick="'reactGame(' + ${game.id} + ', \'dislike\')'">
                            <i class="fas fa-thumbs-down"></i> <span id="dislike-count" th:text="${game.dislikes}">0</span>
                        </button>
                    </div>

                    <button id="openLeaderboardBtn" class="action-btn btn-leaderboard" th:data-game="${game.title}">
                        <i class="fas fa-trophy"></i> Zobacz Ranking
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <div th:if="${game == null}" style="text-align: center; padding: 100px 20px;">
        <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: var(--color-text-secondary); margin-bottom: 20px;"></i>
        <h2>Ups! Nie znaleźliśmy tej gry.</h2>
        <p style="margin-bottom: 30px;">Możliwe, że została usunięta lub link jest niepoprawny.</p>
        <a th:href="@{/}" class="btn">Wróć do katalogu</a>
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin:0;"><i class="fas fa-crown"></i> Top 10 Graczy</h2>
                <span class="close-btn">&times;</span>
            </div>
            <div style="padding: 20px;">
                <p style="text-align:center; font-weight: bold; margin-bottom: 15px;" id="lb-game-title"></p>
                <table class="lb-table">
                    <thead>
                    <tr>
                        <th>Poz.</th>
                        <th>Gracz</th>
                        <th>Wynik</th>
                    </tr>
                    </thead>
                    <tbody id="lb-body">
                    <tr><td colspan="3" style="text-align: center;">Ładowanie...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var currentGameId = /*[[${game != null ? game.id : null}]]*/ null;

    document.addEventListener("DOMContentLoaded", function() {
        const gameIframe = document.getElementById("game-iframe");
        if (gameIframe) {
            gameIframe.onload = function() {
                gameIframe.contentWindow.focus();
            };
        }

        if (currentGameId && localStorage.getItem('voted_game_' + currentGameId)) {
            disableVoteButtons();
        }

        const modal = document.getElementById("leaderboardModal");
        const btn = document.getElementById("openLeaderboardBtn");
        const span = document.querySelector(".close-btn");

        if(btn) {
            btn.onclick = function() {
                const gameTitle = this.getAttribute("data-game");
                document.getElementById("lb-game-title").innerText = gameTitle;
                modal.style.display = "block";

                fetch('/api/records/top/' + encodeURIComponent(gameTitle))
                    .then(response => response.json())
                    .then(records => {
                        const tbody = document.getElementById('lb-body');
                        tbody.innerHTML = '';

                        if (records.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 20px;">Brak rekordów. Bądź pierwszy!</td></tr>';
                            return;
                        }

                        records.forEach((record, index) => {
                            const tr = document.createElement('tr');
                            let rankColor = 'var(--color-text-secondary)';
                            if(index === 0) rankColor = 'gold';
                            else if(index === 1) rankColor = 'silver';
                            else if(index === 2) rankColor = '#cd7f32';

                            tr.innerHTML = `
                                <td><div class="lb-rank-badge" style="color: ${rankColor}">#${index + 1}</div></td>
                                <td><strong>${record.username}</strong></td>
                                <td><span style="color: var(--color-accent); font-weight: bold;">${record.score}</span></td>
                            `;
                            tbody.appendChild(tr);
                        });
                    })
                    .catch(err => {
                        document.getElementById('lb-body').innerHTML = '<tr><td colspan="3" style="text-align: center; color: red;">Błąd ładowania danych.</td></tr>';
                    });
            }
        }

        if(span) span.onclick = () => modal.style.display = "none";
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }
    });

    function disableVoteButtons() {
        const buttons = document.querySelectorAll('.action-btn.btn-like, .action-btn.btn-dislike');
        buttons.forEach(btn => btn.classList.add('disabled'));
    }

    function reactGame(gameId, action) {
        if (localStorage.getItem('voted_game_' + gameId)) return;

        fetch(`/api/games/${gameId}/${action}`, { method: 'POST' })
        .then(response => response.ok ? response.text() : Promise.reject())
        .then(newCount => {
            document.getElementById(action + '-count').innerText = newCount;
            localStorage.setItem('voted_game_' + gameId, 'true');
            disableVoteButtons();
        })
        .catch(error => console.error('Error:', error));
    }
    /*]]>*/
</script>
</body>
</html>
