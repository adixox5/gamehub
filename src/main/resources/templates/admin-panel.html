<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora - GameHub</title>
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Nadpisywanie zmiennych dla ciemnego motywu */
        body.dark-theme {
            --color-bg: #121212;
            --color-bg-card: #1e1e1e;
            --color-text-primary: #ffffff;
            --color-text-secondary: #aaaaaa;
            --color-border: #333333;
            --color-shadow: rgba(0, 0, 0, 0.5);
            background-color: var(--color-bg);
            color: var(--color-text-primary);
        }

        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        /* Sidebar */
        .admin-sidebar {
            background-color: var(--color-bg-card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--color-border);
            height: fit-content;
        }

        .tab-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--color-text-primary);
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover {
            background-color: var(--color-bg);
        }

        .tab-btn.active {
            background-color: var(--color-accent);
            color: white;
        }

        /* Przycisk Ciemnego Motywu */
        .theme-toggle-btn {
            margin-top: 20px;
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
        }

        .theme-toggle-btn:hover {
            background-color: var(--color-border);
        }

        /* Content Area */
        .admin-content {
            background-color: var(--color-bg-card);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--color-border);
            min-height: 500px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-container {
            margin-top: 20px;
            position: relative;
            height: 400px;
            width: 100%;
        }

        h2 { margin-bottom: 20px; border-bottom: 2px solid var(--color-accent); padding-bottom: 10px; }
    </style>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container">
    <div class="admin-container">
        <aside class="admin-sidebar">
            <h3 style="margin-bottom: 20px; padding-left: 10px;">Statystyki</h3>
            <button class="tab-btn active" onclick="showTab('logins-stats')">
                <i class="fas fa-chart-line"></i> Logowania
            </button>
            <button class="tab-btn" onclick="showTab('comments-stats')">
                <i class="fas fa-comments"></i> Komentarze
            </button>
            <button class="tab-btn" onclick="showTab('reactions-stats')">
                <i class="fas fa-thumbs-up"></i> Oceny gier
            </button>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--color-border);">

            <button class="tab-btn theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fas fa-moon"></i> Ciemny motyw
            </button>
        </aside>

        <section class="admin-content">

            <div id="logins-stats" class="tab-content" style="display: block;">
                <h2>Statystyki Logowań (Ostatnie 7 dni)</h2>
                <div class="chart-container">
                    <canvas id="loginsChart"></canvas>
                </div>
            </div>

            <div id="comments-stats" class="tab-content">
                <h2>Ilość komentarzy pod grami</h2>
                <div class="chart-container">
                    <canvas id="commentsChart"></canvas>
                </div>
            </div>

            <div id="reactions-stats" class="tab-content">
                <h2>Zestawienie polubień i ocen negatywnych</h2>
                <div class="chart-container">
                    <canvas id="reactionsChart"></canvas>
                </div>
            </div>

        </section>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script>
    // --- OBSŁUGA MOTYWU ---
    // Sprawdzanie przy ładowaniu strony czy użytkownik miał już włączony ciemny motyw
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        updateThemeButton(true);
    }

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-theme');

        if (isDark) {
            localStorage.setItem('theme', 'dark');
        } else {
            localStorage.setItem('theme', 'light');
        }

        updateThemeButton(isDark);

        // Odśwież wykresy, żeby dostosowały kolory czcionek do tła (opcjonalnie)
        showTab(document.querySelector('.tab-btn.active').getAttribute('onclick').match(/'([^']+)'/)[1]);
    }

    function updateThemeButton(isDark) {
        const btn = document.getElementById('themeBtn');
        if (isDark) {
            btn.innerHTML = '<i class="fas fa-sun"></i> Jasny motyw';
        } else {
            btn.innerHTML = '<i class="fas fa-moon"></i> Ciemny motyw';
        }
    }


    // --- WYKRESY ---
    let loginsChart, commentsChart, reactionsChart;

    Chart.defaults.color = 'var(--color-text-secondary)'; // Ustawia domyślny kolor tekstu na wykresach na zmienną

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.admin-sidebar > .tab-btn:not(.theme-toggle-btn)').forEach(b => b.classList.remove('active'));

        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');

        if (tabId === 'logins-stats') loadLoginsChart();
        if (tabId === 'comments-stats') loadCommentsChart();
        if (tabId === 'reactions-stats') loadReactionsChart();
    }

    function loadLoginsChart() {
        fetch('/api/admin/stats/logins')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('loginsChart').getContext('2d');
                if (loginsChart) loginsChart.destroy();

                loginsChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.week.labels,
                        datasets: [{
                            label: 'Liczba logowań',
                            data: data.week.data,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            });
    }

    function loadCommentsChart() {
        fetch('/api/admin/stats/comments')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('commentsChart').getContext('2d');
                if (commentsChart) commentsChart.destroy();

                commentsChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.label),
                        datasets: [{
                            label: 'Liczba komentarzy',
                            data: data.map(d => d.value),
                            backgroundColor: '#6c757d'
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            });
    }

    function loadReactionsChart() {
        fetch('/api/admin/stats/reactions')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('reactionsChart').getContext('2d');
                if (reactionsChart) reactionsChart.destroy();

                reactionsChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.title),
                        datasets: [
                            {
                                label: 'Polubienia',
                                data: data.map(d => d.likes),
                                backgroundColor: '#2ecc71'
                            },
                            {
                                label: 'Oceny negatywne',
                                data: data.map(d => d.dislikes),
                                backgroundColor: '#e74c3c'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            });
    }

    document.addEventListener('DOMContentLoaded', loadLoginsChart);
</script>

</body>
</html>
