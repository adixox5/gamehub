<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora - GameHub</title>
    <link rel="stylesheet" th:href="@{/style/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Style panelu oparte na zmiennych CSS */
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        .admin-sidebar {
            background-color: var(--color-bg-card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--color-border);
            height: fit-content;
        }

        .tab-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--color-text-primary);
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover {
            background-color: var(--color-bg);
        }

        .tab-btn.active {
            background-color: var(--color-accent);
            color: white;
        }

        .admin-content {
            background-color: var(--color-bg-card);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--color-border);
            min-height: 500px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-container {
            margin-top: 20px;
            position: relative;
            height: 400px;
            width: 100%;
        }

        h2 {
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-accent);
            padding-bottom: 10px;
            color: var(--color-text-primary);
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container">
    <div class="admin-container">
        <aside class="admin-sidebar">
            <h3 class="admin-sidebar-header">Statystyki</h3>
            <button class="tab-btn" onclick="showTab('logins-stats')">
                <i class="fas fa-chart-line"></i> Logowania
            </button>
            <button class="tab-btn" onclick="showTab('comments-stats')">
                <i class="fas fa-comments"></i> Komentarze
            </button>
            <button class="tab-btn" onclick="showTab('reactions-stats')">
                <i class="fas fa-thumbs-up"></i> Oceny gier
            </button>
            <h3 class="admin-sidebar-header" style="margin-top: 20px;">Zarządzanie</h3>
            <button class="tab-btn active" onclick="showTab('submissions-content')">
                <i class="fas fa-gamepad"></i> Zgłoszenia gier
            </button>
        </aside>

        <section class="admin-content">
            <div id="logins-stats" class="tab-content">
                <h2>Statystyki Logowań (Ostatnie 7 dni)</h2>
                <div class="chart-container">
                    <canvas id="loginsChart"></canvas>
                </div>
            </div>

            <div id="comments-stats" class="tab-content">
                <h2>Ilość komentarzy pod grami</h2>
                <div class="chart-container">
                    <canvas id="commentsChart"></canvas>
                </div>
            </div>

            <div id="reactions-stats" class="tab-content">
                <h2>Zestawienie polubień i ocen negatywnych</h2>
                <div class="chart-container">
                    <canvas id="reactionsChart"></canvas>
                </div>
            </div>

            <div id="submissions-content" class="tab-content" style="display: block;">
                <h2>Nowe zgłoszenia gier</h2>
                <div class="submissions-table-container">
                    <table class="submissions-table">
                        <thead>
                            <tr>
                                <th>Tytuł</th>
                                <th>Kategoria</th>
                                <th>Link</th>
                                <th>Zgłaszający</th>
                                <th>Status</th>
                                <th>Akcje</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dane zostaną wstrzyknięte przez JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>

<script>
    let loginsChart, commentsChart, reactionsChart;

    // Funkcja do pobierania aktualnego koloru tekstu ze zmiennych CSS
    function getChartTextColor() {
        return getComputedStyle(document.body).getPropertyValue('--color-text-secondary').trim() || '#666';
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');

        if (tabId === 'logins-stats') loadLoginsChart();
        if (tabId === 'comments-stats') loadCommentsChart();
        if (tabId === 'reactions-stats') loadReactionsChart();
        if (tabId === 'submissions-content') loadSubmissions();
    }

    function loadLoginsChart() {
        fetch('/api/admin/stats/logins')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('loginsChart').getContext('2d');
                if (loginsChart) loginsChart.destroy();

                loginsChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.week.labels,
                        datasets: [{
                            label: 'Liczba logowań',
                            data: data.week.data,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: getChartTextColor() } } },
                        scales: {
                            x: { ticks: { color: getChartTextColor() } },
                            y: { ticks: { color: getChartTextColor() } }
                        }
                    }
                });
            });
    }

    function loadCommentsChart() {
        fetch('/api/admin/stats/comments')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('commentsChart').getContext('2d');
                if (commentsChart) commentsChart.destroy();

                commentsChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.label),
                        datasets: [{
                            label: 'Liczba komentarzy',
                            data: data.map(d => d.value),
                            backgroundColor: '#6c757d'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: getChartTextColor() } } },
                        scales: {
                            x: { ticks: { color: getChartTextColor() } },
                            y: { ticks: { color: getChartTextColor() } }
                        }
                    }
                });
            });
    }

    function loadReactionsChart() {
        fetch('/api/admin/stats/reactions')
            .then(res => res.json())
            .then(data => {
                const ctx = document.getElementById('reactionsChart').getContext('2d');
                if (reactionsChart) reactionsChart.destroy();

                reactionsChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.title),
                        datasets: [
                            { label: 'Polubienia', data: data.map(d => d.likes), backgroundColor: '#2ecc71' },
                            { label: 'Oceny negatywne', data: data.map(d => d.dislikes), backgroundColor: '#e74c3c' }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: getChartTextColor() } } },
                        scales: {
                            x: { ticks: { color: getChartTextColor() } },
                            y: { beginAtZero: true, ticks: { color: getChartTextColor() } }
                        }
                    }
                });
            });
    }

    function loadSubmissions() {
        fetch('/api/admin/submissions')
            .then(res => res.json())
            .then(data => {
                const tbody = document.querySelector('.submissions-table tbody');
                tbody.innerHTML = '';
                data.forEach(sub => {
                    const row = `
                        <tr>
                            <td>${sub.title}</td>
                            <td>${sub.category}</td>
                            <td><a href="${sub.gameLink}" target="_blank">Link</a></td>
                            <td>${sub.username}</td>
                            <td><span class="status-${sub.status.toLowerCase()}">${sub.status}</span></td>
                            <td class="actions">
                                ${sub.status === 'PENDING' ? `
                                    <button class="btn-approve" onclick="approveSubmission(${sub.id})">Akceptuj</button>
                                    <button class="btn-reject" onclick="rejectSubmission(${sub.id})">Odrzuć</button>
                                ` : ''}
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            });
    }

    function approveSubmission(id) {
        fetch(`/api/admin/submissions/${id}/approve`, { method: 'POST' }).then(() => loadSubmissions());
    }

    function rejectSubmission(id) {
        fetch(`/api/admin/submissions/${id}/reject`, { method: 'POST' }).then(() => loadSubmissions());
    }


    document.addEventListener('DOMContentLoaded', loadSubmissions);

    const observer = new MutationObserver(() => {
        const activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) {
            const tabId = activeTab.getAttribute('onclick').match(/'([^']+)'/)[1];
            if (tabId === 'logins-stats') loadLoginsChart();
            if (tabId === 'comments-stats') loadCommentsChart();
            if (tabId === 'reactions-stats') loadReactionsChart();
            if (tabId === 'submissions-content') loadSubmissions();
        }
    });
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
</script>

</body>
</html>
