<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - GameHub spadł z rowerka</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style/style.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    .error-container {
        text-align: center;
        padding: 100px 20px;
    }
    .error-code {
        font-size: 120px;
        font-weight: bold;
        color: var(--color-accent);
        line-height: 1;
        margin-bottom: 20px;
        text-shadow: 4px 4px var(--color-shadow);
    }
    .error-icon {
        font-size: 80px;
        margin-bottom: 30px;
        color: var(--color-text-secondary);
    }
  </style>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container">
  <div class="error-container">
    <div class="error-icon">
      <i class="fas fa-bicycle"></i> <i class="fas fa-dizzy"></i>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="mb-4">Ups! GameHub spadł z rowerka...</h2>
    <p class="lead mb-5 text-muted">Strona, której szukasz, nie istnieje lub została przeniesiona do innego wymiaru. <br> Dajcie nam chwilkę :D</p>

    <a th:href="@{/}" class="btn btn-primary btn-lg">
      <i class="fas fa-home me-2"></i> Wróć na stronę główną
    </a>
  </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
